name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}
  workflow_call: {}

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install test runner (pytest)
        run: pip install pytest

      - name: Check syntax (compileall)
        run: python -m compileall main.py app scripts

      - name: Run tests (pytest)
        run: python -m pytest

      - name: Check for unresolved merge conflict markers
        run: |
          if git grep -n -E '^(<<<<<<<|=======|>>>>>>>)' -- ':!*.md'; then
            echo "::error::Unresolved merge conflict markers found in the files listed above."
            exit 1
          fi
