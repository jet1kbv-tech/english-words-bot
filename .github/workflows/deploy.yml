name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: test
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            cd /opt/english-words-bot
            . .venv/bin/activate
            git fetch origin main
            git show origin/main:scripts/backup_database.py > /tmp/english-words-bot-backup-database.py
            python /tmp/english-words-bot-backup-database.py
            git checkout main
            git reset --hard origin/main
            pip install -r requirements.txt
            sudo systemctl restart english-words-bot
            sudo systemctl status english-words-bot --no-pager
